<div class="drawing-area-container">
    <div class="toolbar">
        <h3>Drawing Area</h3>
        <button class="clear-btn" (click)="clearDrawing()">Clear Drawing</button>
    </div>
    <svg
        class="drawing-canvas"
        [class.drag-over]="isDragOver()"
        viewBox="0 0 1200 600"
        preserveAspectRatio="xMidYMid meet"
        (drop)="onDrop($event)"
        (dragover)="onDragOver($event)"
        (dragleave)="onDragLeave($event)">
        <defs>
            <marker id="arrowhead-draw" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                <polygon points="0 0, 10 3.5, 0 7" fill="black" />
            </marker>
        </defs>

        <!-- Grid background for better visual reference -->
        <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
            <path d="M 50 0 L 0 0 0 50" fill="none" stroke="lightgray" stroke-width="0.5"/>
        </pattern>
        <rect width="100%" height="100%" fill="url(#grid)" />

        <!-- Render connection lines behind nodes -->
        @for (line of connectionLines(); track line.id) {
            <svg:line
                xmlns:svg="http://www.w3.org/2000/svg"
                [attr.x1]="line.x1"
                [attr.y1]="line.y1"
                [attr.x2]="line.x2"
                [attr.y2]="line.y2"
                stroke="black"
                stroke-width="2" />
        }

        <!-- Render all drawn elements -->
        @for (element of drawnElements(); track $index) {
            <g class="element-wrapper" [attr.data-element-id]="element.id">
                <g appSvgNode [diagramNode]="element.node" [selected]="selectedElementId() === element.id" />
                <!-- Transparent overlay to capture mouse events -->
                <svg:rect
                    class="drag-overlay"
                    xmlns:svg="http://www.w3.org/2000/svg"
                    [attr.x]="element.node.x - 60"
                    [attr.y]="element.node.y - 60"
                    width="120"
                    height="120"
                    fill="none"
                    stroke="none"
                    pointer-events="all"
                    style="cursor: move;"
                    (mousedown)="onElementMouseDown($event, element)"
                    (contextmenu)="onElementRightClick($event, element)" />
            </g>
        }
    </svg>
    <div class="instructions">
        <p>Drag and drop elements from the display area above to create your process net.</p>
        <p>Click and drag elements to move them around.</p>
        <p>Right-click one place or transition to select, then right-click the opposite type to connect them.</p>
    </div>
</div>
