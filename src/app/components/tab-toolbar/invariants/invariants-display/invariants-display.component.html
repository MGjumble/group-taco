<div class="display-wrapper">
    <svg
        #drawingArea
        class="canvas"
        [attr.viewBox]="viewBox()"
        preserveAspectRatio="xMidYMid meet"
        (drop)="processDropEvent($event)"
        (dragover)="prevent($event)"
        (mousedown)="$event.target === drawingArea && startPan($event)"
        (mousemove)="pan($event)"
        (mouseup)="endPan()"
        (mouseleave)="endPan()"
        (wheel)="onWheel($event)">
        (drop)="processDropEvent($event)" (dragover)="prevent($event)">
        <defs>
            <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                <polygon points="0 0, 10 3.5, 0 7" fill="black" />
            </marker>
        </defs>

        @for (arc of diagram()?.getEdges(); track arc.id) {
            <g appSvgArc [diagramArc]="arc" [nodes]="diagram()?.getNodes() || []" />
        }

        @for (node of diagram()?.getNodes(); track node.id) {
            <g appSvgNode [diagramNode]="node" />
        }
    </svg>
    @if (diagram()) {
        <div class="toggle-container">
            <span class="toggle-label">{{ 'INVARIANTS.SHOW_TRANSITION_BALANCES' | translate }}</span>
            <label class="toggle-switch">
                <input
                    type="checkbox"
                    [checked]="entryService.showTransitionBalances()"
                    (change)="entryService.showTransitionBalances.set($any($event.target).checked)" />
                <span class="toggle-slider"></span>
            </label>
        </div>
    }
</div>
